<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>音乐播放器</title>
  <link rel="stylesheet" type="text/css" href="./audio.css" />
  <style>
    /* 简约深色背景（不花哨，按键清晰） */
    body {
      background: #20292b !important;
      margin: 0;
      padding: 20px;
    }

    /* 统一所有控制按钮样式：白色、大小一致、纯CSS绘制 */
    .center-icon {
      position: relative;
      width: 30px;
      height: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 播放/暂停主按钮（保留原有样式，纯白色系） */
    #playPause {
      position: relative;
      width: 50px;
      height: 50px;
      background: #ffffff;
      border-radius: 50%;
      cursor: pointer;
    }
    /* 播放：黑色三角形 */
    #playPause.icon-play::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 55%;
      transform: translate(-50%, -50%);
      border-left: 14px solid #000000;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
    }
    /* 暂停：标准双竖线（纯CSS，无表情） */
    #playPause.icon-pause::before,
    #playPause.icon-pause::after {
      content: "";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 18px;
      background: #000;
    }
    #playPause.icon-pause::before { left: 18px; }
    #playPause.icon-pause::after { left: 28px; }

    /* 纯CSS绘制：上一曲按钮 ◀◀ */
    #skipForward::before,
    #skipForward::after {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-right: 8px solid #fff;
    }
    #skipForward::before { left: 8px; }
    #skipForward::after { left: 18px; }

    /* 纯CSS绘制：下一曲按钮 ▶▶ */
    #skipBackward::before,
    #skipBackward::after {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 8px solid #fff;
    }
    #skipBackward::before { left: 8px; }
    #skipBackward::after { left: 18px; }

    /* 纯CSS绘制：循环模式按钮（原始样式保留） */
    #playMode::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-radius: 50%;
      border-top-color: transparent;
    }

    /* ===================== 仅新增：三种播放模式图标 ===================== */
    /* 列表循环（默认） */
    #playMode.mode-list::before { border-right-color: transparent; }
    /* 单曲循环 */
    #playMode.mode-single::after {
      content: "1";
      position: absolute;
      color: #fff;
      font-size: 10px;
      font-weight: bold;
    }
    /* 随机播放 */
    #playMode.mode-random::before {
      border: none;
      width: 14px;
      height: 2px;
      background: #fff;
      transform: rotate(45deg);
    }
    #playMode.mode-random::after {
      content: "";
      position: absolute;
      width: 14px;
      height: 2px;
      background: #fff;
      transform: rotate(-45deg);
    }
    /* ==================================================================== */

    /* 纯CSS绘制：音量按钮 */
    #volume::before {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-right: 8px solid #fff;
    }
    #volume::after {
      content: "";
      position: absolute;
      width: 6px;
      height: 6px;
      background: #fff;
      left: 10px;
    }

    /* 底部按钮统一白色 */
    .bottom-icon, .speed {
      color: #ffffff !important;
      font-size: 16px;
      cursor: pointer;
    }

    /* 音量滑块纯白色 */
    #volumn-togger {
      accent-color: #ffffff !important;
      width: 80px;
    }

    /* 文字全白色，清晰可见 */
    #music-title, .author-container, .time-container, .music-list-title, .all-list div {
      color: #ffffff !important;
    }

    /* 封面图片正常显示 */
    #record-img {
      background-size: cover !important;
      background-position: center !important;
      background-repeat: no-repeat !important;
    }
  </style>
</head>
<body id="body">
  <div class="upper-container">
    <div class="record-container">
      <div class="record-bg">
        <div id="record-img" class="rotate-play"></div>
      </div>
    </div>
    <div class="introduction-container">
      <div class="text-container">
        <div id="music-title">音乐1</div>
        <div class="author-container">
          作者：<span id="author-name">未知</span>
        </div>
      </div>
    </div>
  </div>

  <div class="audio-box">
    <div class="audio-container">
      <audio id="audioTag"></audio>
      
      <div class="a-progress">
        <div class="pgs-total" id="progress-total">
          <div class="pgs-play" id="progress" style="width: 0%"></div>
        </div>
      </div>

      <div class="a-controls">
        <div class="time-container">
          <span class="played-time" id="playedTime">00:00</span>&nbsp;/&nbsp;
          <span class="audio-time" id="audioTime">00:00</span>
        </div>

        <div class="center-button-container">
          <div id="playMode" class="center-icon mode"></div>
          <div id="skipForward" class="center-icon s-right"></div>
          <div id="playPause" class="icon-play"></div>
          <div id="skipBackward" class="center-icon s-left"></div>
          <div id="volume" class="center-icon volume"></div>
          <input type="range" id="volumn-togger" value="70" min="0" max="100">
        </div>

        <div class="bottom-button-container">
          <div id="list" class="bottom-icon list">列表</div>
          <div id="speed" class="speed">1.0X</div>
        </div>
      </div>
    </div>
  </div>

  <div class="close-list" id="close-list"></div>
  <div class="music-list" id="music-list">
    <div class="music-list-container">
      <div class="music-list-title">播放队列</div>
      <hr class="line" />
      <div class="all-list">
        <div id="music0">传奇</div>
        <div id="music1">百年孤寂</div>
        <div id="music2">红豆</div>
      </div>
    </div>
  </div>

  <script src="audio.js"></script>
</body>
</html>
